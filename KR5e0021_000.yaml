body:
  text: 洞玄靈寶玄真人説生死輪轉因緣經母六爾時仙人雲度以景元元年正月二十日於崑崙金臺玉室請問三天法師玄一真人曰自以卑下謬遭皇恩積學二千八百餘年雖得乘雲駕龍逍遙太空未得登天之任隂陽之事來去之緣事非所關理不得知近而未審人生死因緣為父為母為兄為弟姊妹室家為世世常會復有分别各隨功德先世之人為生後世與不其罪福多少為輕為重盡受何形其道異同師友交會皆緣何因願為分别釋所未聞真人曰子之所問微乎遠矣來去之事將亦未聞運度當周事不容藏今為子説之祕而奉行道常一也無極無窮古天所奉今天所宗其一無二但諸天人言音不同號之為異大歸一也師亦一也但隨世變易出化於世匠成萬物先世之人輪於太隂後各隨功受生是今世之人也天地一闔人隨運滅天地一開人隨運生日月星辰亦隨運轉是故因緣不絶天地與人日月星辰亦不重易但緣展轉以相生父母妻子兄弟姊妹皆非常會各隨福德來暫寄胎於父母也後復各隨功德運轉散離無有常定或先世為父母後生為子孫或先世為兄弟後世為父母輪轉去來更生更死師者傳世不絶常為師也故師我父母也為常生之匠父母兄弟本亦無親但隨福德來寄生父母養成人故聖人制法孝順以報育養之恩以致孝心若不孝不順王法誅之天亦伐之兄弟暫共生於父母當相親愛共致孝心父母終亡祖葬禮畢以報生養之恩四時祠祀以為慈孝之法傳告後世使知有孝養之恩夫婦亦鮮相事易重恩愛棄父母之姓就夫之姓未嫁繫命父母既嫁繫命於夫夫亡繫命於子婦死夫存門户由成夫死婦嫁血脈斷絶故男屬父姓女屬母生無名無姓人生世間如春草之華生無定日死有常分生時暫共為室家死各隨因緣歸所繫屬不復會也有福者更生天堂或生貴家王候之門有罪者繫於長夜塗若謫罰無極唯四時五臘時或聚會相見亦復歡喜念生時恩愛既别之後各還所屬永相去失不復憶之須鬼功竟隨謫輕重各隨因緣或生為人或墮五道六畜邊夷之中先日之緣冥然絶矣無復有親人生有子孫隂陽之禮會樂天地之間死亡精魂在天但有謫罰無復隂陽相生之義故生以為人死以為鬼生死之間但易名而已生之為樂死之為苦故令生人不得知地下鬼事死人為鬼知地上之事為鬼皆樂生活但不能自須罪竟過輕者得還生人中更隨功多少寄胎生為人生為惡者死為鬼求生終不得生方充長徒寒苦無極罪盡當作六畜形或邊夷之類或生六疾盲聾癲癡為男女臭穢可憎之極為人所不友生受飢寒凍餓至死苦毒後又生六畜之中未有脫期或生奴婢下賤之人驅使畏人常苦飢寒笞杖在身觀人俯仰任人殺活爾時魂神不復自知從何來生唯考鬼知之生有善功死為鬼君歡樂之堂天給厨食逍遙無為須功竟後生天王之門或富貴之家財祿自然適意自足與善人相會恆值聖世賢人結緣福路日生身後命終徑生天堂若能供養三寶心慕神仙必降致仙人白日升天之道若但修常善之行不經泰山地官七祖同慶生死之事明如日月賢者獨見愚人不識諦受精思自然朗察棄放惡心以善為業天地冥冥功過無脫毫毛悉載無有漏失也真人曰凡人生死上古之時悉皆由心天帝門下校定名録應死者削除生名更上鬼字應來生世削落鬼字更上生名然後隨其福德輕重輕者生貧賤之家生世塗炭備經六極至死寒苦流曳賣身飴口恆不飽足衣服恆不蓋形有人之形無人之祿功重者生貴盛之門或生財祿不要自來萬向良合衣食自然不經辛苦恆值善人賢聖交會今下古未傳運氣當終人生無有定壽天選人身自有主生神又有主死神在人身中生世好生則生神護之生世好死則死神伐之好生之人則與生券之中好死之人則與死券之下皆結約分明而人不覺知也生世積善則與聖人相值名入左契生為人主死為天堂之賔七祖同歡後生或為王侯之子或生世聰明聖達為天人之師四海人神宗奉功滿白日升仙故功德不絶世世常與賢聖結緣巍巍之功莫有比者生世為惡則與惡人相宜名入死籍右契之中在世常與善人相遠衆不定會福德之處常所不受死入地獄餓鬼之中七祖相牽冥冥辰夜未有出期是為善惡相去何若生世為善之人天選善人來生為其子孫使父母得其恩福皆由善功之報生世為惡天選惡逆子孫來生其門墮地難保既得成大為人逆惡不孝或輕淫偷盜劫賊殺人恆為父母重憂罪輕役身重則沒身或貧賤窮寒有朝無暮為人走使常苦飢凍衣不蓋形杖罰不去於身不識昔緣或癡聾瘖啞盲目筋攣或朝生夕死或三歲十歲垂及成人而死或為人及毒獸所害而死或恆為官獄囚繫無已令父母憂愁歎息而行或多生女無男至老孤獨窮厄如此皆先世行惡之報更相牽對為父母子孫其理分明不可違犯犯者不原真人説生死去來因緣竟而頌善緣來生其辭曰大道體本無二氣幽絶冥隂陽和三德天地運機張生死隨運轉罪福不偏嬰積福種善功善人來相生福緣善來會去來身受榮生出為世主或為天人宗命過天堂賔福祿恆隨身策龍轡朱鳳逍遙戲上清或為諸聖王封掌於十天七祖同受慶南宫更受生永與惡緣絶世世常光明真人又頌惡緣來生曰天地雖無無可以期相生生世不念善為罪重積盈死受塗炭苦風火不去形罪竟還生人恆託寒賤門抱病嬰重疾聾盲癲且狂罪逆自來會衆惡不去身形繫鞭笞杖鬼病歲不空父母長歎息生死地獄中冥冥淪惡道望善永無緣真人曰道以歸善如水投淵惡人之難化如高樹之標無良地之源雖聞善道當時知有因顧已忘如雨墮高林當時雖潤回即已燥善人聞道如大江之淵大海之源惟受不逆道教難聞聖人難值賢者難遇自非天地運度當交經道不出聖人不見帝王有道聖人生國大運當交期度將會天運轉促至末世之後朔旦冬節金氏之世經道方明其時當暫太平數十年中人民五分四分知道至金馬之末天運交周水龍之歲李君出治其時聖世生死善惡將分善心男女逆作善功至時當有聖人出世度人有遇值者便是宿功報應或身得超度或一門同慶得入福中當惡之人常與善乖聞聖人説法謂之為無此非善人之根天閉其心使不與聖人相宜故善惡異流天地永隔運交之際道德雖興愚者甚多知道者少萬中有一以為多也各各教化不尋本源其時當有鬼黠之子因是猶豫二心不信大法亦不能分别真偽將是期度欲交天使之然有心男女善則勿退退則失爾前功一失賢人萬劫不會夫賢人出世難得平奉或託癡聾或清或濁或廉或貞或隱或見或是或非或棄薄天人或偏有所愛入境之始惡當有異若是聖人其行不移雖諸變化久故恆清與凡有别是為不雜常俗既見之後恐不可得奉其當潛隱或去於境邑或絶蹤無迹若與是乖萬劫永隔爾與賢人結緣則坐享福祚七祖登天死升天堂衣食自然如此皆先世有緣道使之然無緣之子雖居葺賢人之籬坐賢人連席其緣不會非可強求明知罪福毫分不失縱復遇會或嬰罹衆禍因是不集此皆前世無緣天迷其心鬼閉其意不使得與善會故有殊隔使其更致重離去善日遠若人之欲善因會遇害因心不退福必來會言畢於是也傳與賢人勿令漏泄具如經法盟乃傳焉洞玄靈寶玄一真人説生死輪轉因緣經
